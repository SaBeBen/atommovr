version: 1
about:
  project: "AtomMover full pipeline"
  description: "Consolidated configuration spanning imaging, rotation estimation, rearrangement algorithms, and AWG control."
  references:
    - optimize_blob_params.py
    - test_imaging.py
    - atommover/utils/imaging/extraction.py
    - atommover/algorithms/single_species.py
paths:
  scratch_dir: figs/imaging_test
  blob_param_csv: data/benchmark_pipeline/blob_param_search_grid_extraction.csv
  estimation_benchmark_csv: data/benchmark_pipeline/benchmark_estimation.csv
  rotation_feasibility_csv: data/benchmark_pipeline/feasibility_results.csv
  pipeline_summary_csv: data/benchmark_pipeline/pipeline_steps_summary.csv
  awg_sequences_dir: output/estimation_tech
  logs: test_imaging.log
imaging:
  sample_generation:
    image_shape: [1200, 1200]
    grid_size_range: [45, 49]
    seeds: [45, 46, 47, 48, 49]
    load_probability: 0.6
    sigma:
      mean: 1.5
      std: 0.01
    brightness_range: [0.8, 1.0]
    noise_level: 0.01
    stripe_intensity: 0.001
    rotation_angles_deg: [-10, -7, -5, -2, 0, 2, 5, 7, 10]
  rotation_estimation:
    primary: fit_rect
    fallbacks: [vectorize, pair_diff, pca, fourier_img]
    module: atommover.utils.imaging.extraction
    enforce_bounds_deg: [-90, 90]
    acceptance_tolerance_deg: 0.5
    reestimate_on_failure: true
    inverse_rotation:
      enabled: true
      function: inverse_rotate_centroids
      image_padding: retain
  blob_detection:
    detector_class: atommover.utils.imaging.extraction.BlobDetection
    default_shape: [45, 45]
    scale: [1, 1]
    visualization: false
    params:
      filterByColor: true
      blobColor: 255
      minThreshold: 70
      maxThreshold: 255
      thresholdStep: 20
      minDistBetweenBlobs: 10
      minArea: 5
      maxArea: 1000
      filterByArea: false
      filterByCircularity: false
      filterByConvexity: false
      filterByInertia: false
    top_param_sets:
      - name: fast-balanced
        avg_time_ms: 78.30
        feasibility_rate: 1.0
        params:
          filterByColor: true
          blobColor: 255
          minThreshold: 70
          maxThreshold: 255
          thresholdStep: 20
          minDistBetweenBlobs: 10
          minArea: 5
          maxArea: 1000
          filterByArea: false
          filterByCircularity: false
          filterByConvexity: false
          filterByInertia: false
      - name: area-constrained
        avg_time_ms: 69.14
        feasibility_rate: 1.0
        params:
          filterByColor: true
          blobColor: 255
          minThreshold: 70
          maxThreshold: 255
          thresholdStep: 20
          minDistBetweenBlobs: 10
          minArea: 5
          maxArea: 1000
          filterByArea: true
          filterByCircularity: false
          filterByConvexity: false
          filterByInertia: false
    scoring:
      recall_threshold: 0.99
      precision_threshold: 0.99
      feasibility_flag: "recall>=0.99 and precision>=0.99"
      exact_match_target: 1.0
    benchmark_csv: data/benchmark_pipeline/blob_param_search_grid_extraction.csv
  grid_assignment:
    method: fit_grid_and_assign
    enforce_binary: true
    min_points: 3
    padding_mode: digitize
    metrics_function: test_imaging._compute_assignment_metrics
    outputs:
      corrected_image_path: figs/imaging_test/corrected_blob_array_image.png
      overlay_dir: figs/imaging_test
algorithms:
  default_species: 1
  ejection:
    enabled: false
    method: sublattice
  preferred_order:
    - pcfa
    - tetris
    - parallel_lbap
    - parallel_hungarian
    - generalized_balance
    - bc_v2
  implementations:
    pcfa:
      class_path: atommover.algorithms.single_species.PCFA
      preferred_width_factor: 2.0
      min_extra_columns: 2
      do_ejection: false
    tetris:
      class_path: atommover.algorithms.single_species.Tetris
      preferred_width_factor: 1.4
      do_ejection: false
    parallel_lbap:
      class_path: atommover.algorithms.single_species.ParallelLBAP
      round_limit: sum_target
      do_ejection: false
    parallel_hungarian:
      class_path: atommover.algorithms.single_species.ParallelHungarian
      round_limit: sum_target
      do_ejection: false
    generalized_balance:
      class_path: atommover.algorithms.single_species.GeneralizedBalance
      do_ejection: false
    bc_v2:
      class_path: atommover.algorithms.single_species.BCv2
      do_ejection: false
physical_system:
  spacing_m: 5.0e-6
  loading_prob: 0.6
  target_occup_prob: 0.5
  aod_speed_m_per_us: 0.1
  lifetime_s: 30.0
  geometry: square
  random_seed: 42
awg_control:
  settings:
    class_path: atommover.utils.awg_control.AODSettings
    f_min_v: 80_000_000.0
    f_max_v: 124_000_000.0
    f_min_h: 80_000_000.0
    f_max_h: 124_000_000.0
    grid_rows: 45
    grid_cols: 45
    target_rows: 45
    target_cols: 45
    alignment: center
  converter:
    class_path: atommover.utils.awg_control.RFConverter
    amplitude: 1.0
    min_duration_s: 1.0e-6
    deduplicate_parallel_moves: true
benchmarking:
  blob_param_search:
    script: optimize_blob_params.py
    seeds: [45, 46, 47, 48, 49]
    grid_sizes: [45, 46, 47, 48, 49]
    image_shape: [1200, 1200]
    output_csv: data/benchmark_pipeline/blob_param_search_grid_extraction.csv
  rotation_estimation:
    summary_csv: data/benchmark_pipeline/benchmark_estimation.csv
    feasibility_csv: data/benchmark_pipeline/feasibility_results.csv
  pipeline_profile_csv: data/benchmark_pipeline/pipeline_steps_summary.csv
  pipeline_benchmark:
    grid_sizes: [5, 10, 20, 35, 50, 100, 200]
    image_shapes:
      - "1200x1200"
      # - "800x1200"
    angles: [-5, -2,-1, 0, 1, 2, 5]
    seeds: [42, 43, 44, 45, 46, 47]
    time_plot_path: figs/benchmark_pipeline/full_pipeline/full_pipeline_time_vs_target_sites.png
logging:
  level: INFO
  handler: StreamHandler
  fmt: "[%(levelname)s] %(message)s"
  logfile: test_imaging.log
visualization:
  save_plots: true
  module: atommover.utils.imaging.visualization
  overlay_centroids: true
  show_intermediate: false
  output_dir: figs/imaging_test
outputs:
  corrected_images: figs/imaging_test
  mappings: data/benchmark_pipeline/mappings
  rotation_images: figs/benchmark_pipeline/rot_images
