name: CI

# Trigger CI on pushes and pull requests
on:
  push:
  pull_request:

jobs:
  ci:
    # Matrix allows us to run on multiple OSes and Python versions
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: [3.10, 3.11, 3.12, 3.13, 3.14]

    runs-on: ${{ matrix.os }}

    steps:
      # 1. Check out the repository
      - uses: actions/checkout@v4

      # 2. Set up Python for this OS
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # 3. Install nox (our pipeline runner)
      - name: Install nox
        run: pip install nox

      # 4. Run all sessions defined in noxfile.py
      - name: Run nox sessions
        run: nox

      # Optional: upload coverage reports
      # - name: Upload coverage to Codecov
      #   uses: codecov/codecov-action@v3
      #   with:
      #     token: ${{ secrets.CODECOV_TOKEN }}
      #     files: ./coverage.xml
